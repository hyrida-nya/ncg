<!DOCTYPE html>
<html>
<head>
    <title>Login - NCG Chat</title>
    <script type="module" src="https://esm.run/@material/web/all.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f5f5f5; }
        .chat-container { width: 300px; padding: 2rem; background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 1rem; }
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; text-align: center; }
    </style>
</head>
<body>
    <div id="alertModal" class="modal"><div class="modal-content"><p id="alertMsg"></p><md-filled-button onclick="closeModal()">Close</md-filled-button></div></div>
    <div class="chat-container">
        <h2>Login</h2>
        <md-outlined-text-field id="user" label="Username"></md-outlined-text-field>
        <md-outlined-text-field id="pass" label="Password" type="password"></md-outlined-text-field>
        <md-filled-button id="loginBtn">Login</md-filled-button>
        <p><a href="/register.html">Register an account</a></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Auto-login check: If cookie exists, jump straight to chat!
        if (document.cookie.includes('username=')) {
            window.location.href = '/chat.html';
        }

        const socket = io();
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            socket.emit('login', { user, pass });
        });

        socket.on('login-success', () => {
            const user = document.getElementById('user').value;
            document.cookie = `username=${user}; path=/; max-age=86400`; // Cookie lasts 1 day
            window.location.href = '/chat.html';
        });
        socket.on('login-fail', (msg) => {
            document.getElementById('alertMsg').textContent = msg;
            document.getElementById('alertModal').style.display = 'flex';
        });
        function closeModal() { document.getElementById('alertModal').style.display = 'none'; }
    </script>
</body>
</html>
